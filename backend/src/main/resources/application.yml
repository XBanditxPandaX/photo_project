server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/photo_db}
    username: ${PGUSER:admin}
    password: ${PGPASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

contact:
  mail:
    to: ${CONTACT_MAIL_TO:}
    from: ${CONTACT_MAIL_FROM:}
    sender-name: ${CONTACT_MAIL_SENDER_NAME:Photo Project}

brevo:
  api:
    url: ${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
    key: ${BREVO_API_KEY:}