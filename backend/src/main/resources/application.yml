server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/photo_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

contact:
  mail:
    to: ${CONTACT_MAIL_TO:}
    from: ${CONTACT_MAIL_FROM:}
    sender-name: ${CONTACT_MAIL_SENDER_NAME:Photo Project}

brevo:
  api:
    url: ${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
    key: ${BREVO_API_KEY:}

jwt:
  secret: ${JWT_SECRET:cGhvdG9wcm9qZWN0LXNlY3JldC1rZXktMjAyNC12ZXJ5LWxvbmctc3RyaW5nLWZvci1zZWN1cml0eQ==}
  expiration: 86400000